<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linguist — Language Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <p class="eyebrow">Language Identification Quiz</p>
  <h1><em>Linguist</em></h1>
  <p class="subtitle">Can you identify these languages?</p>
</header>

<!-- Landing Page -->
<div class="page landing-page" id="landingPage">
  <div class="selector-card">
    <p class="selector-eyebrow">Choose a Quiz</p>
    <div class="quiz-grid" id="quizGrid"></div>
  </div>
</div>

<!-- Game Page -->
<div class="page game-page" id="gamePage" style="display: none;">
  <div class="quiz-wrap" id="quizWrap">
    <div class="progress-bar-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-label" id="progressLabel">1 / 10</span>
      <button class="back-btn" id="backBtn" onclick="app.backToHome()">← Home</button>
    </div>

    <div class="lang-tags" id="langTags"></div>

    <div class="card">
      <p class="question-num" id="questionNum">Question 01</p>
      <p class="question-text" id="questionText"></p>
      <p class="question-hint" id="questionHint">Which language is this phrase written in?</p>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="app.nextQuestion()">Next Question →</button>
    </div>
  </div>
</div>

<!-- Results Page -->
<div class="page results-page" id="resultsPage" style="display: none;">
  <div class="results-container">
    <div class="results-header">
      <p class="results-eyebrow">Quiz Complete</p>
      <h2 class="results-title" id="resultsTitle"></h2>
      <p class="quiz-name-subtitle" id="quizNameSubtitle"></p>
    </div>
    
    <div class="score-display">
      <div class="score-circle">
        <div class="score-percentage" id="scorePercentage"></div>
        <div class="score-ratio" id="scoreRatio"></div>
      </div>
      <p class="results-message" id="resultsMessage"></p>
    </div>

    <div class="high-score-info">
      <p class="high-score-text" id="highScoreText"></p>
    </div>

    <div class="results-breakdown">
      <p class="breakdown-title">Score by Language</p>
      <div class="breakdown" id="breakdown"></div>
    </div>

    <div class="share-section">
      <p class="share-label">Share your score</p>
      <div class="share-controls">
        <input type="text" id="shareLink" class="share-link-input" readonly>
        <button class="copy-btn" onclick="app.copyShareLink()">Copy</button>
      </div>
    </div>

    <div class="results-actions">
      <button class="restart-btn" onclick="app.retakeQuiz()">Play Again</button>
      <button class="back-to-quiz-btn" onclick="app.backToHome()">← Home</button>
    </div>
  </div>
</div>
<footer style="margin-top:2em;text-align:center;color:var(--muted);font-family:'Playfair Display', serif;font-size:1.1em;">
  Created by <a href="https://pcwu2022.github.io" style="color:var(--gold);">Po-Chun Wu</a>
</footer>

<script src="quizzes/index.js"></script>
<script src="app.js"></script>
<script src="quiz.js"></script>
</body>
</html>
