<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Once Upon a Time - Storyteller's Gate</title>
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Once Upon a Time - Storyteller's Gate">
    <meta property="og:description" content="Choose your realm and begin your storytelling legend.">
    <meta property="og:image" content="assets/card_back.png">
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Once Upon a Time - Storyteller's Gate">
    <meta property="twitter:description" content="Choose your realm and begin your storytelling legend.">
    <meta property="twitter:image" content="assets/card_back.png">

    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&family=Pirata+One&display=swap" rel="stylesheet">
</head>
<body class="landing-body">
    <div class="app-container landing-container">
        <header>
            <div class="top-nav">
                <a href="help.html" class="help-link" title="Learn how to play and use this app">📜 How to Play</a>
            </div>
            <h1>Once Upon a Time</h1>
            <p class="subtitle">Choose your realm and begin your legend</p>
        </header>

        <main>
            <div id="theme-gallery" class="theme-grid">
                <!-- Theme cards will be injected here -->
            </div>
        </main>

        <footer>
            <div class="footer-info">Created by <a href="https://pcwu2022.github.io">Po-Chun Wu</a></div>
        </footer>

        <audio id="background-music" loop></audio>
    </div>

    <!-- Music Player Widget -->
    <div class="music-widget">
        <button id="music-toggle-btn" class="btn-music-widget" title="Toggle background music">🔊</button>
        <div class="music-widget-controls">
            <input type="range" id="volume-slider" class="volume-slider-widget" min="0" max="100" value="50" title="Adjust music volume">
        </div>
    </div>

    <!-- Introduction Modal -->
    <div id="intro-modal" class="modal hidden">
        <div class="modal-content intro-content">
            <div id="intro-image-container" class="intro-image"></div>
            <h2 id="intro-title"></h2>
            <p id="intro-description"></p>
            <div class="intro-actions">
                <button id="cancel-intro" class="btn-secondary">Back to Gallery</button>
                <button id="start-story-btn" class="btn-primary">Enter the Story</button>
            </div>
        </div>
    </div>

    <script src="landing.js"></script>
</body>
</html>
